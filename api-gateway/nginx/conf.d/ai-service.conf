    # Use Docker embedded DNS resolver and proxy via variables so nginx
    # does not perform a blocking DNS lookup at config parse time.
    # Docker's internal DNS listens on 127.0.0.11 inside containers.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Build upstream host:port as a variable so DNS resolution is deferred
    set $ai_upstream "ai-service:8002";

    location = /api/ai/health/ {
        proxy_pass http://$ai_upstream/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ai/ {
        # rewrite /api/ai/* -> /api/v1/* for FastAPI routes
        rewrite ^/api/ai/(.*)$ /api/v1/$1 break;
        proxy_pass http://$ai_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
