
services:

  # ==================================================
  # FRONTEND
  # ==================================================
  frontend:
    build:
      context: ../frontend
    container_name: frontend
    env_file:
      - ../frontend/.env
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "http://127.0.0.1:3000", "-q", "-O", "-"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  # ==================================================
  # API GATEWAY
  # ==================================================
  api-gateway:
    build:
      context: ../api-gateway/nginx
    container_name: api-gateway
    env_file:
      - ../api-gateway/nginx/.env
    ports:
      - "8080:8000"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - app-network

  # ==================================================
  # USER SERVICE + MYSQL
  # ==================================================
  user-service:
    build:
      context: ../user-service
    container_name: user-service
    env_file:
      - ../user-service/.env
    ports:
      - "8001:8001"
    depends_on:
      user-db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../user-service:/app
    environment:
      - DJANGO_DEBUG=1
      - USER_SEED_ON_STARTUP=1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health/').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  user-db:
    image: mysql:8.0
    container_name: user-db
    env_file:
      - ../user-service/.env
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - user-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  # ==================================================
  # PRODUCT SERVICE + POSTGRES
  # ==================================================
  product-service:
    build:
      context: ../product-service
    container_name: product-service
    env_file:
      - ../product-service/.env
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379/1
      - PRODUCT_SEED_ON_STARTUP=1
    depends_on:
      product-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/api/health/').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  product-db:
    image: postgres:15
    container_name: product-db
    env_file:
      - ../product-service/.env
    ports:
      - "5432:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  # ==================================================
  # AI SERVICE + NEO4J
  # ==================================================
  ai-service:
    build:
      context: ../ai-service
    container_name: ai-service
    env_file:
      - ../ai-service/.env
    ports:
      - "8002:8002"
    volumes:
      - ../ai-service/app:/app/app
      - ../ai-service/models:/app/models
      - ../ai-service/artifacts:/app/artifacts
      - ai-db-data:/app/chromadb
    # depends_on:
    #   neo4j:
    #     condition: service_healthy
    environment:
      - AI_SEED_ON_STARTUP=1
    command: >
      sh -c "if [ \"$$AI_SEED_ON_STARTUP\" = \"1\" ]; then echo 'Seeding AI databases...'; python sync_chroma.py > /tmp/chroma-seed.log 2>&1; python scripts/create_kb_graph.py > /tmp/neo4j-seed.log 2>&1; fi; exec gunicorn -w 1 -k uvicorn.workers.UvicornWorker --timeout 600 app.main:app --bind 0.0.0.0:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 512M
    networks:
      - app-network

  # neo4j:
  #   image: neo4j:5.12-community
  #   container_name: neo4j
  #   environment:
  #     NEO4J_AUTH: neo4j/123456
  #     NEO4J_PLUGINS: '["apoc"]'
