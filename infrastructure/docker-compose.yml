  #     NEO4J_server_config_strict__validation_enabled: "false"
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   volumes:
  #     - neo4j-data:/data
  #     - neo4j-logs:/logs
  #   healthcheck:
  #     test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "123456", "RETURN 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 30s
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G
  #       reservations:
  #         memory: 512M
  #   networks:
  #     - app-network

  # ==================================================
  # CART SERVICE + MYSQL
  # ==================================================
  cart-service:
    build:
      context: ../cart-service
    container_name: cart-service
    env_file:
      - ../cart-service/.env
    ports:
      - "8004:8004"
    depends_on:
      cart-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/api/health/').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  cart-db:
    image: mysql:8.0
    container_name: cart-db
    env_file:
      - ../cart-service/.env
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3310:3306"
    volumes:
      - cart-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  # ==================================================
  # ORDER SERVICE + MYSQL
  # ==================================================
  order-service:
    build:
      context: ../order-service
    container_name: order-service
    env_file:
      - ../order-service/.env
    environment:
      - SHIPPING_SERVICE_URL=http://shipping-service:8007/api
      - ORDER_SEED_ON_STARTUP=1
    ports:
      - "8005:8005"
    depends_on:
      order-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8005/api/health/').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  order-db:
    image: mysql:8.0
    container_name: order-db
    env_file:
      - ../order-service/.env
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3309:3306"
    volumes:
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  # ==================================================
  # PAYMENT SERVICE + MYSQL
  # ==================================================
  payment-service:
    build:
      context: ../payment-service
    container_name: payment-service
    env_file:
      - ../payment-service/.env
    ports:
      - "8006:8006"
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8006/api/payments/health/').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    env_file:
      - ../payment-service/.env
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3308:3306"
    volumes:
      - payment-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  # ==================================================
  # SHIPPING SERVICE + MYSQL
  # ==================================================
  shipping-service:
    build:
      context: ../shipping-service
    container_name: shipping-service
    env_file:
      - ../shipping-service/.env
    environment:
      - SHIPPING_SEED_ON_STARTUP=1
    ports:
      - "8007:8007"
    depends_on:
      shipping-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8007/api/shipping/health/').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  shipping-db:
    image: mysql:8.0
    container_name: shipping-db
    env_file:
      - ../shipping-service/.env
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - shipping-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

  # ==================================================
  # REDIS
  # ==================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - app-network

  # ==================================================
  # RABBITMQ
  # ==================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network

# ==================================================
# NETWORK
# ==================================================
networks:
  app-network:
    driver: bridge

# ==================================================
# VOLUMES
# ==================================================
volumes:
  user-db-data:
  product-db-data:
  cart-db-data:
  order-db-data:
  payment-db-data:
  shipping-db-data:
  # neo4j-data:
  # neo4j-logs:
  ai-db-data:


# DOCKER_BUILDKIT=1 docker-compose build
# DOCKER_BUILDKIT=1 docker build -t ten_image .